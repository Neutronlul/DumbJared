name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build images and run tests
        run: |
          mkdir -p coverage/reports && chmod 777 coverage/reports && \
          docker compose -f compose.test.yaml run --rm backend \
          pytest --cov-report=xml:/app/output/backend-coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          fail_ci_if_error: true
          files: ./coverage/reports/backend-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
